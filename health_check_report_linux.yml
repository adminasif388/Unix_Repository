---
- name: Linux Server Connectivity Check
  hosts: all
  gather_facts: no

  vars:
    report_file: "/tmp/connectivity_report.txt"

  tasks:

    - name: Ensure report file exists on control node
      delegate_to: 192.168.31.159
      run_once: true
      file:
        path: "{{ report_file }}"
        state: touch

    - name: Check connectivity using ping module
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Save SUCCESS result
      delegate_to: 192.168.31.159
      lineinfile:
        path: "{{ report_file }}"
        line: "Host: {{ inventory_hostname }} - Status: SUCCESS"
        create: yes
      when: ping_result is succeeded

    - name: Save FAILED result
      delegate_to: l92.168.31.159
      lineinfile:
        path: "{{ report_file }}"
        line: "Host: {{ inventory_hostname }} - Status: FAILED"
        create: yes
      when: ping_result is failed
