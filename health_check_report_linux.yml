---
- name: Linux Server Connectivity Check and Email Report
  hosts: all
  gather_facts: no

  vars:
    report_file: "/tmp/connectivity_report.txt"
    email_to: "asifali388@gmail.com"
    email_from: "nazmabatool388@gmail.com"
    smtp_host: "smtp.example.com"
    smtp_port: 25

  tasks:

    - name: Ensure report file is clean
      delegate_to: 192.168.31.159
      run_once: true
      copy:
        dest: "{{ report_file }}"
        content: ""

    - name: Check connectivity using ping module
      ping:
      register: ping_result
      ignore_errors: yes

    - name: Save SUCCESS result
      delegate_to: localhost
      lineinfile:
        path: "{{ report_file }}"
        line: "Host: {{ inventory_hostname }} - Status: SUCCESS"
      when: ping_result is succeeded

    - name: Save FAILED result
      delegate_to: 192.168.31.159
      lineinfile:
        path: "{{ report_file }}"
        line: "Host: {{ inventory_hostname }} - Status: FAILED"
      when: ping_result is failed


- name: Send Email Report
  hosts: 192.168.31.159
  gather_facts: no

  vars:
    report_file: "/tmp/connectivity_report.txt"
    email_to: "asifali388@gmail.com"
    email_from: "nazmabatool388@gmail.com"
    smtp_host: "smtp.example.com"
    smtp_port: 25

  tasks:

    - name: Read report content
      slurp:
        src: "{{ report_file }}"
      register: report_content

    - name: Send email
      mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        to: "{{ email_to }}"
        from: "{{ email_from }}"
        subject: "Ansible Connectivity Report"
        body: "{{ report_content.content | b64decode }}"
