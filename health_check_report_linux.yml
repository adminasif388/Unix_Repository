---
- name: Simple Linux Connectivity Check
  hosts: all
  gather_facts: true

  vars:
    report_file: "/tmp/connectivity_report.txt"

  tasks:

    - name: Clear old report
      delegate_to: 192.168.31.159
      run_once: true
      copy:
        dest: "{{ report_file }}"
        content: ""

    - name: Test connectivity
      ping:
      register: result
      ignore_errors: true

    - name: Write SUCCESS
      delegate_to: 192.168.31.159
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }} : SUCCESS"
      when: result is succeeded

    - name: Write FAILED
      delegate_to: 192.168.31.159
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }} : FAILED"
      when: result is failed


- name: Send Email
  hosts: 192.168.31.159
  gather_facts: false

  vars:
    report_file: "/tmp/connectivity_report.txt"

  tasks:

    - name: Read report
      slurp:
        src: "{{ report_file }}"
      register: report

    - name: Send mail
      mail:
        host: "smtp.gmail.com"   # change this
        port: 25                  # change if needed
        to: "asifali388@gmail.com"
        from: "nazmabatool388@gmail.com"
        subject: "Server Connectivity Report"
        body: "{{ report.content | b64decode }}"
