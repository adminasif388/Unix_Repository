---
- name: Install Monitoring Agent and Ensure Service is Running
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    monitoring_agent: "telegraf"   # change to your agent (node_exporter, zabbix-agent, etc.)

  tasks:

    - name: Install monitoring agent on Debian/Ubuntu
      ansible.builtin.apt:
        name: "{{ monitoring_agent }}"
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install monitoring agent on RHEL/CentOS
      ansible.builtin.yum:
        name: "{{ monitoring_agent }}"
        state: present
      when: ansible_os_family == "RedHat"

    - name: Enable monitoring agent service
      ansible.builtin.systemd:
        name: "{{ monitoring_agent }}"
        enabled: yes

    - name: Start monitoring agent service
      ansible.builtin.systemd:
        name: "{{ monitoring_agent }}"
        state: started

    - name: Verify service status
      ansible.builtin.command: systemctl is-active {{ monitoring_agent }}
      register: agent_status
      ignore_errors: yes

    - name: Show service status
      ansible.builtin.debug:
        msg: "Monitoring agent {{ monitoring_agent }} is {{ agent_status.stdout }}"
