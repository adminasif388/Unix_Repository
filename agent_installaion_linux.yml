---
- name: Install Symantec Endpoint Protection on Linux
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    sep_package_src: /home/ansible/sep_linux_client.zip  # change to your package path
    sep_extract_dir: /tmp/sep_linux_client.zip
    sep_installer: "install.sh"

  tasks:

    # ----------------------------
    # Copy SEP package
    # ----------------------------
    - name: Copy SEP package to target
      copy:
        src: /home/ansible/sep_linux_client.zip
        dest: /tmp/sep_linux_client.zip

    # ----------------------------
    # Extract package
    # ----------------------------
    - name: Extract SEP package
      ansible.builtin.unarchive:
        src: /tmp/sep_linux_client.zip
        dest: /opt/sep/
        remote_src: yes

    # ----------------------------
    # Give execute permission
    # ----------------------------
    - name: Make installer executable
      ansible.builtin.file:
        path: "{{ sep_extract_dir }}/{{ sep_installer }}"
        mode: '0755'

    # ----------------------------
    # Install SEP silently
    # ----------------------------
    - name: Install SEP client
      ansible.builtin.shell: |
        cd {{ sep_extract_dir }}
        ./{{ sep_installer }} -i
      args:
        creates: /opt/Symantec
      register: install_output

    - name: Show install output
      ansible.builtin.debug:
        var: install_output.stdout_lines

    # ----------------------------
    # Start SEP service
    # ----------------------------
    - name: Start SEP service
      ansible.builtin.systemd:
        name: rtvscand
        state: started
        enabled: yes
      ignore_errors: yes

    # ----------------------------
    # Verify service status
    # ----------------------------
    - name: Check SEP service status
      ansible.builtin.command: systemctl is-active rtvscand
      register: sep_status
      ignore_errors: yes

    - name: Show SEP status
      ansible.builtin.debug:
        msg: "SEP service is {{ sep_status.stdout }}"
