---
- name: Install and Start ITM Agent on Linux & ensure services running
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    itm_install_dir: "/opt/IBM/ITM"
    itm_package_src: "/tmp/itm_agent.tar.gz"  
    itm_extract_dir: "/tmp/itm_agent"
    itm_agent_service: "itmcmd"               

  tasks:

    # ----------------------------
    # Copy ITM package
    # ----------------------------
    - name: Copy ITM agent package to target
      ansible.builtin.copy:
        src: "{{ itm_package_src }}"
        dest: "/tmp/itm_agent.tar.gz"

    # ----------------------------
    # Extract package
    # ----------------------------
    - name: Extract ITM package
      ansible.builtin.unarchive:
        src: "/tmp/itm_agent.tar.gz"
        dest: "{{ itm_extract_dir }}"
        remote_src: yes

    # ----------------------------
    # Install ITM agent
    # ----------------------------
    - name: Run ITM silent installation
      ansible.builtin.shell: |
        cd {{ itm_extract_dir }}
        ./install.sh -silent
      args:
        creates: "{{ itm_install_dir }}"
      register: install_output

    - name: Show install output
      ansible.builtin.debug:
        var: install_output.stdout_lines

    # ----------------------------
    # Configure ITM agent (optional)
    # ----------------------------
    - name: Configure ITM agent (silent config)
      ansible.builtin.shell: |
        {{ itm_install_dir }}/bin/itmcmd config -A
      register: config_output
      ignore_errors: yes

    # ----------------------------
    # Start ITM agent
    # ----------------------------
    - name: Start ITM agent
      ansible.builtin.shell: |
        {{ itm_install_dir }}/bin/itmcmd agent start
      register: start_output

    # ----------------------------
    # Check ITM agent status
    # ----------------------------
    - name: Check ITM agent status
      ansible.builtin.shell: |
        {{ itm_install_dir }}/bin/itmcmd agent status
      register: status_output

    - name: Show ITM agent status
      ansible.builtin.debug:
        var: status_output.stdout_lines
