---
- name: Linux Full System Audit Report
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    report_file: "/tmp/linux_full_audit_report.txt"

  tasks:

  # =========================
  # INIT REPORT
  # =========================

  - name: Initialize report
    copy:
      dest: "{{ report_file }}"
      content: |
        ======================================
        LINUX FULL SYSTEM AUDIT REPORT
        ======================================
        Host: {{ ansible_hostname }}
        Date: {{ ansible_date_time.date }}
        ======================================

  # =========================
  # SYSTEM BASIC INFO
  # =========================

  - name: Uptime
    shell: uptime
    register: uptime_out

  - name: Timezone
    shell: timedatectl
    register: tz_out
    ignore_errors: yes

  - name: Add system info
    lineinfile:
      path: "{{ report_file }}"
      line: |
        UPTIME:
        {{ uptime_out.stdout }}

        TIMEZONE:
        {{ tz_out.stdout | default('N/A') }}

  # =========================
  # TIME SYNC
  # =========================

  - name: Time sync status
    shell: timedatectl show | grep -E "NTPSynchronized|NTP"
    register: timesync
    ignore_errors: yes

  - name: Add time sync
    lineinfile:
      path: "{{ report_file }}"
      line: "TIME SYNC:\n{{ timesync.stdout }}"

  # =========================
  # CONFIG FILES
  # =========================

  - name: /etc/hosts
    shell: cat /etc/hosts
    register: hosts_out

  - name: /etc/sudoers (safe view)
    shell: cat /etc/sudoers | grep -v '^#' || true
    register: sudo_out
    ignore_errors: yes

  - name: /etc/resolv.conf
    shell: cat /etc/resolv.conf
    register: resolv_out

  - name: /etc/fstab
    shell: cat /etc/fstab
    register: fstab_out

  - name: /etc/inittab (legacy systems)
    shell: cat /etc/inittab || true
    register: inittab_out
    ignore_errors: yes
    
  # =========================
  # DISK / LVM
  # =========================

  - name: df -hTP
    shell: df -hTP
    register: df_out

  - name: vgdisplay
    shell: vgdisplay -v
    register: vg_out
    ignore_errors: yes

  # =========================
  # SYSTEM INFO
  # =========================

  - name: uname -a
    shell: uname -a
    register: uname_a

  - name: OS release
    shell: cat /etc/redhat-release || cat /etc/os-release
    register: os_out
    ignore_errors: yes

  - name: runlevel
    shell: runlevel
    register: runlevel_out
    ignore_errors: yes

  # =========================
  # PACKAGES
  # =========================

  - name: rpm packages
    shell: rpm -qa
    register: rpm_out
    ignore_errors: yes

  # =========================
  # PROCESS CHECKS
  # =========================

  - name: ps -ef
    shell: ps -ef
    register: ps_out

  # =========================
  # NETWORK INFO
  # =========================

  - name: ifconfig -a
    shell: ifconfig -a
    register: ifcfg_out
    ignore_errors: yes

  - name: ethtool (interfaces summary)
    shell: "for i in $(ls /sys/class/net); do echo $i; ethtool $i 2>/dev/null || true; echo '---'; done"
    register: ethtool_out
    ignore_errors: yes

  # =========================
  # CRON
  # =========================

  - name: crontab -l
    shell: crontab -l || true
    register: cron_out
    ignore_errors: yes

  # =========================
  # WRITE REPORT
  # =========================

  - name: Append all collected data
    copy:
      dest: "{{ report_file }}"
      content: |
        ======================================
        SYSTEM AUDIT DETAILS
        ======================================

        UPTIME:
        {{ uptime_out.stdout }}

        TIMEZONE:
        {{ tz_out.stdout | default('N/A') }}

        TIME SYNC:
        {{ timesync.stdout }}

        DF -hTP:
        {{ df_out.stdout }}

        VGDISPLAY:
        {{ vg_out.stdout | default('N/A') }}

        RPM PACKAGES:
        {{ rpm_out.stdout | default('N/A') }}

        PS -EF:
        {{ ps_out.stdout }}

        IFCONFIG:
        {{ ifcfg_out.stdout | default('N/A') }}

        ETHTOOL:
        {{ ethtool_out.stdout | default('N/A') }}

        CRONTAB:
        {{ cron_out.stdout }}

        UNAME:
        {{ uname_a.stdout }}

        OS RELEASE:
        {{ os_out.stdout }}

        RUNLEVEL:
        {{ runlevel_out.stdout | default('N/A') }}

        FSTAB:
        {{ fstab_out.stdout }}

        HOSTS:
        {{ hosts_out.stdout }}

        SUDOERS:
        {{ sudo_out.stdout | default('N/A') }}

        RESOLV.CONF:
        {{ resolv_out.stdout }}

        INITTAB:
        {{ inittab_out.stdout | default('N/A') }}

  # =========================
  # READ REPORT
  # =========================

  - name: Read report
    slurp:
      src: "{{ report_file }}"
    register: report_data

  - name: Set report content
    set_fact:
      report_content: "{{ report_data.content | b64decode }}"

 
