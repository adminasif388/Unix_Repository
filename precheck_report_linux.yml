---
- name: Pre-check multiple Linux servers
  hosts: all
  gather_facts: yes
  become: yes

  vars:
    required_services:
      - sshd
      - NetworkManager
      - chronyd

  tasks:

    - name: Check if host is reachable via Ansible ping
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: yes

    - name: Report ping result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} is reachable"
      when: ping_result.ping is defined

    - name: Check available disk space
      ansible.builtin.command: df -h /
      register: disk_result

    - name: Show disk usage
      ansible.builtin.debug:
        var: disk_result.stdout_lines

    - name: Check memory usage
      ansible.builtin.command: free -m
      register: mem_result

    - name: Show memory info
      ansible.builtin.debug:
        var: mem_result.stdout_lines

    - name: Check CPU load
      ansible.builtin.command: uptime
      register: cpu_result

    - name: Show CPU load
      ansible.builtin.debug:
        var: cpu_result.stdout_lines

    - name: Check required services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop: "{{ required_services }}"
      register: service_status
      ignore_errors: yes

    - name: Display service check results
      ansible.builtin.debug:
        var: service_status.results

    - name: Check open ports 22 and 80
      ansible.builtin.shell: "ss -tulnp | grep -E ':22|:80'"
      register: port_check
      ignore_errors: yes

    - name: Display port check
      ansible.builtin.debug:
        var: port_check.stdout_lines

    - name: Check system uptime
      ansible.builtin.command: uptime
      register: uptime_result

    - name: Show uptime result
      ansible.builtin.debug:
        var: uptime_result.stdout_lines   

    - name: Build final report
      set_fact:
        final_report: |
          ==============================
          SERVER PRE-CHECK REPORT
          ==============================

          Host: {{ inventory_hostname }}

          --- PING ---
          {{ ping_result.ping | default('FAILED') }}

          --- DISK ---
          {{ disk_result.stdout }}

          --- MEMORY ---
          {{ mem_result.stdout }}

          --- CPU LOAD ---
          {{ cpu_result.stdout }}

          --- UPTIME ---
          {{ uptime_result.stdout }}

          --- SERVICES ---
          {{ service_status.results | to_nice_yml }}

          --- PORT CHECK ---
          {{ port_check.stdout | default('No output / ports not open') }}

    - name: Ensure reports directory exists
      file:
        path: /tmp
        state: directory
      delegate_to: vm01

    - name: Save report to file
      copy:
        content: "{{ final_report }}"
        dest: "/tmp/{{ inventory_hostname }}_health_check_report.txt"
      delegate_to: vm01

    - name: Show report location
      debug:
        msg: "Report saved for {{ inventory_hostname }} in /tmp/"  
