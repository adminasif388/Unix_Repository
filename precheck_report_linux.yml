---
- name: Linux Precheck Report
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    report_file: /tmp/precheck_check_report.txt
    
- name: Ensure reports directory exists
        file:
        path: /tmp
        state: directory
        delegate_to: vm01

- name: Save report to file
        copy:
        content: "{{ final_report }}"
        dest: "/tmp/{{ inventory_hostname }}_precheck_check_report.txt"
        delegate_to: vm01

- name: Show report location
        debug:
        msg: "Report saved for {{ inventory_hostname }} in /tmp/"  

  tasks:

    - name: Initialize report file
      copy:
        dest: "{{ report_file }}"
        content: |
          ============================
          LINUX SYSTEM AUDIT REPORT
          ============================

    - name: Collect system info
      shell: |
        echo "HOSTNAME: $(hostname)"
        echo "UPTIME: $(uptime)"
        echo "DATE: $(date)"
        echo "TIMEZONE: $(timedatectl 2>/dev/null | grep 'Time zone' || cat /etc/timezone 2>/dev/null)"
      register: sys_info

    - name: /etc/hosts
      shell: cat /etc/hosts
      register: etc_hosts

    - name: /etc/fstab
      shell: cat /etc/fstab
      register: etc_fstab

    - name: Network config
      shell: ip a || ifconfig -a
      register: ifcfg

    - name: DNS config
      shell: cat /etc/resolv.conf
      register: resolv

    - name: sysctl config
      shell: cat /etc/sysctl.conf
      register: sysctl

    - name: Mount points
      shell: mount
      register: mount

    - name: Disk usage (human)
      shell: df -hTP
      register: df_h

    - name: Disk usage (MB)
      shell: df -m
      register: df_m

    - name: Block devices
      shell: lsblk
      register: lsblk

    - name: FDISK
      shell: fdisk -l
      register: fdisk

    - name: LVM display
      shell: lvdisplay || true
      register: lvm

    - name: Memory
      shell: free -h
      register: memory

    - name: Kernel info
      shell: uname -a && uname -r
      register: kernel

    - name: Installed packages
      shell: rpm -qa
      register: rpm_qa

    - name: Last installed packages
      shell: rpm -qa --last | head
      register: rpm_last

    - name: Network sockets TCP/UDP
      shell: netstat -lnup || ss -lnup
      register: net_udp

    - name: Network TCP listening
      shell: netstat -lntp || ss -lntp
      register: net_tcp

    - name: Routing table
      shell: netstat -rn || ip r
      register: routes

    - name: Firewall rules
      shell: iptables -L -n -v
      register: iptables

    - name: Modules
      shell: lsmod
      register: lsmod

    - name: Module info
      shell: modinfo ext4 || true
      register: modinfo

    - name: CPU / memory processes
      shell: ps -eo pid,vsz,rss,cmd --sort=-vsz | head
      register: ps_vsz

    - name: Full process list
      shell: ps -ef
      register: ps_ef

    - name: Cron jobs
      shell: crontab -l || true
      register: cron

    - name: Write final report
      copy:
        dest: "{{ report_file }}"
        content: |
          ============================
          LINUX SYSTEM AUDIT REPORT
          ============================

          SYSTEM INFO:
          {{ sys_info.stdout }}

          /etc/hosts:
          {{ etc_hosts.stdout }}

          /etc/fstab:
          {{ etc_fstab.stdout }}

          NETWORK CONFIG:
          {{ ifcfg.stdout }}

          DNS:
          {{ resolv.stdout }}

          SYSCTL:
          {{ sysctl.stdout }}

          MOUNTS:
          {{ mount.stdout }}

          DF -hTP:
          {{ df_h.stdout }}

          DF -m:
          {{ df_m.stdout }}

          LVM:
          {{ lvm.stdout }}

          FDISK:
          {{ fdisk.stdout }}

          MEMORY:
          {{ memory.stdout }}

          KERNEL:
          {{ kernel.stdout }}

          RPM PACKAGES:
          {{ rpm_qa.stdout }}

          LAST RPM:
          {{ rpm_last.stdout }}

          TCP SESSIONS:
          {{ net_tcp.stdout }}

          UDP SESSIONS:
          {{ net_udp.stdout }}

          ROUTES:
          {{ routes.stdout }}

          IPTABLES:
          {{ iptables.stdout }}

          MODULES:
          {{ lsmod.stdout }}

          MODINFO:
          {{ modinfo.stdout }}

          TOP PROCESSES:
          {{ ps_vsz.stdout }}

          PROCESSES:
          {{ ps_ef.stdout }}

          CRON:
          {{ cron.stdout }}
