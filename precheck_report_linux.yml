---
- name: Linux Server Precheck with Report and Email
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    report_file: "/tmp/linux_precheck_report.txt"
    mail_to: "asifali388@gmail.com"
    mail_subject: "Linux Precheck Report"

  tasks:

  # =========================
  # CREATE REPORT HEADER
  # =========================

  - name: Initialize report file
    copy:
      dest: "{{ report_file }}"
      content: |
        ================================
        Linux Precheck Report
        ================================
        Date: {{ ansible_date_time.date }}
        Host: {{ ansible_hostname }}
        ================================

  # =========================
  # SYSTEM INFO
  # =========================

  - name: Add system information
    lineinfile:
      path: "{{ report_file }}"
      line: |
        OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
        Kernel: {{ ansible_kernel }}
        CPU: {{ ansible_processor_vcpus }} cores
        Memory: {{ ansible_memtotal_mb }} MB

  # =========================
  # DISK CHECK
  # =========================

  - name: Check disk usage
    shell: df -h /
    register: disk

  - name: Append disk usage
    lineinfile:
      path: "{{ report_file }}"
      line: "{{ disk.stdout }}"

  # =========================
  # MEMORY CHECK
  # =========================

  - name: Check memory usage
    shell: free -m
    register: mem

  - name: Append memory usage
    lineinfile:
      path: "{{ report_file }}"
      line: "{{ mem.stdout }}"

  # =========================
  # NETWORK CHECK
  # =========================

  - name: Check network connectivity
    shell: ping -c 2 8.8.8.8
    register: net
    ignore_errors: yes

  - name: Append network status
    lineinfile:
      path: "{{ report_file }}"
      line: "Network: {{ 'UP' if net.rc == 0 else 'DOWN' }}"

  # =========================
  # SSH SERVICE CHECK
  # =========================

  - name: Check SSH service
    shell: systemctl is-active sshd
    register: ssh
    ignore_errors: yes

  - name: Append SSH status
    lineinfile:
      path: "{{ report_file }}"
      line: "SSH Service: {{ ssh.stdout | default('unknown') }}"

  # =========================
  # UPTIME CHECK
  # =========================

  - name: Check uptime
    shell: uptime
    register: up

  - name: Append uptime
    lineinfile:
      path: "{{ report_file }}"
      line: "{{ up.stdout }}"

  # =========================
  # READ REPORT
  # =========================

  - name: Read report file
    slurp:
      src: "{{ report_file }}"
    register: report

  - name: Set report content
    set_fact:
      report_content: "{{ report.content | b64decode }}"

  # =========================
  # SEND EMAIL
  # =========================

  - name: Send report via email
    mail:
      host: vm01
      port: 25
      to: "{{ mail_to }}"
      subject: "{{ mail_subject }}"
      body: "{{ report_content }}"
