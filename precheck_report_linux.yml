---
- name: Linux System Audit Playbook
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    output_file: /tmp/linux_audit_report.txt

  tasks:

  - name: Create/clear report file
    copy:
      dest: "{{ output_file }}"
      content: "Linux Audit Report\n====================\n\n"

  - name: Collect hostname
    shell: hostname
    register: hostname

  - name: Collect uptime
    shell: uptime
    register: uptime

  - name: Collect date
    shell: date
    register: date

  - name: Collect timezone
    shell: timedatectl 2>/dev/null || cat /etc/timezone
    register: timezone

  - name: Collect /etc/hosts
    shell: cat /etc/hosts
    register: etc_hosts

  - name: Collect /etc/fstab
    shell: cat /etc/fstab
    register: etc_fstab

  - name: Collect IP configuration
    shell: ip a || ifconfig -a
    register: ifcfg

  - name: Collect routing table
    shell: ip r || netstat -rn
    register: route

  - name: Collect DNS config
    shell: cat /etc/resolv.conf
    register: resolv

  - name: Collect sysctl config
    shell: cat /etc/sysctl.conf
    register: sysctl

  - name: Collect mounts
    shell: mount
    register: mount

  - name: Collect disk usage (df -hTP)
    shell: df -hTP
    register: df_hTP

  - name: Collect disk usage (df -m)
    shell: df -m
    register: df_m

  - name: Collect block devices
    shell: lsblk
    register: lsblk

  - name: Collect fdisk output
    shell: fdisk -l
    register: fdisk

  - name: Collect LVM display
    shell: lvdisplay || true
    register: lvm

  - name: Collect memory usage
    shell: free -h
    register: memory

  - name: Collect kernel version
    shell: uname -r
    register: kernel

  - name: Collect system info
    shell: uname -a
    register: uname

  - name: Installed packages
    shell: rpm -qa
    register: rpm_qa

  - name: Installed packages with last install info
    shell: rpm -qa --last | head
    register: rpm_last

  - name: Network sockets (listening TCP/UDP)
    shell: netstat -lnup || ss -lnup
    register: net_udp

  - name: Network sockets (TCP listening)
    shell: netstat -lntp || ss -lntp
    register: net_tcp

  - name: Network routes
    shell: netstat -rn || ip r
    register: net_routes

  - name: IPTables rules
    shell: iptables -L -n -v
    register: iptables

  - name: List loaded modules
    shell: lsmod
    register: lsmod

  - name: Module info (sample kernel module)
    shell: modinfo ext4 || true
    register: modinfo

  - name: Process memory usage
    shell: ps -eo pid,vsz,rss,cmd --sort=-vsz | head
    register: ps_vsz

  - name: Process list
    shell: ps -ef
    register: ps_ef

  - name: CPU info
    shell: lscpu || cat /proc/cpuinfo
    register: cpu

  - name: Write all outputs to report file
    copy:
      dest: "{{ output_file }}"
      content: |
        ===== SYSTEM AUDIT REPORT =====

        HOSTNAME:
        {{ hostname.stdout }}

        UPTIME:
        {{ uptime.stdout }}

        DATE:
        {{ date.stdout }}

        TIMEZONE:
        {{ timezone.stdout }}

        /etc/hosts:
        {{ etc_hosts.stdout }}

        /etc/fstab:
        {{ etc_fstab.stdout }}

        NETWORK (IP CONFIG):
        {{ ifcfg.stdout }}

        ROUTES:
        {{ route.stdout }}

        DNS:
        {{ resolv.stdout }}

        SYSCTL:
        {{ sysctl.stdout }}

        MOUNT:
        {{ mount.stdout }}

        DF -hTP:
        {{ df_hTP.stdout }}

        DF -m:
        {{ df_m.stdout }}

        LVM:
        {{ lvm.stdout }}

        FDISK:
        {{ fdisk.stdout }}

        MEMORY:
        {{ memory.stdout }}

        KERNEL:
        {{ kernel.stdout }}

        UNAME:
        {{ uname.stdout }}

        RPM PACKAGES:
        {{ rpm_qa.stdout }}

        LAST RPM:
        {{ rpm_last.stdout }}

        TCP SOCKETS:
        {{ net_tcp.stdout }}

        UDP SOCKETS:
        {{ net_udp.stdout }}

        ROUTES (NETSTAT):
        {{ net_routes.stdout }}

        IPTABLES:
        {{ iptables.stdout }}

        MODULES:
        {{ lsmod.stdout }}

        MODINFO:
        {{ modinfo.stdout }}

        PS VSZ TOP:
        {{ ps_vsz.stdout }}

        PS -EF:
        {{ ps_ef.stdout }}

        CPU INFO:
        {{ cpu.stdout }}
